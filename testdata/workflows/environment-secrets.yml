name: Environment Secrets Test
on: push

jobs:
  staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - run: echo "Staging secret is ${{ secrets.DEPLOY_KEY }}"
      - run: echo "Global secret is ${{ secrets.GLOBAL_TOKEN }}"

  production:
    needs: staging
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://example.com
    steps:
      - run: echo "Production secret is ${{ secrets.DEPLOY_KEY }}"
      - run: echo "Global secret is ${{ secrets.GLOBAL_TOKEN }}"
