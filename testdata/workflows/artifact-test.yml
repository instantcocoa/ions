name: Artifact Test
on: push

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Create artifact content
        run: |
          mkdir -p dist
          echo "build-output-v1.0" > dist/release.txt
          echo "another file" > dist/notes.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-release
          path: dist/

  download:
    runs-on: ubuntu-latest
    needs: upload
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: my-release
          path: downloaded/

      - name: Verify artifact
        run: |
          if [ -f downloaded/release.txt ]; then
            echo "Artifact downloaded successfully!"
            cat downloaded/release.txt
          else
            echo "Artifact download failed!"
            exit 1
          fi
